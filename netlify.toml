[build]
  publish = "."
  functions = "functions"

# ----------------------------------------------------
# Scramjet static passthrough (served by Netlify)
# ----------------------------------------------------

# Everything under /scramjet/* comes from the scramjet folder in the repo
[[redirects]]
  from = "/scramjet/*"
  to   = "/scramjet/:splat"
  status = 200

# Map /scram/* -> /scramjet/scram/*
[[redirects]]
  from = "/scram/*"
  to   = "/scramjet/scram/:splat"
  status = 200

# Map /baremux/* -> /scramjet/baremux/*
[[redirects]]
  from = "/baremux/*"
  to   = "/scramjet/baremux/:splat"
  status = 200

# Map /libcurl/* -> /scramjet/libcurl/*
[[redirects]]
  from = "/libcurl/*"
  to   = "/scramjet/libcurl/:splat"
  status = 200

# ----------------------------------------------------
# Everything else gets handled by the proxy function,
# which uses page_link.txt to find the real origin.
# ----------------------------------------------------

[[redirects]]
  from = "/*"
  to   = "/.netlify/functions/proxy"
  status = 200
  force = true
