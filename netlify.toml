[build]
  publish = "."
  functions = "functions"

# --- Scramjet static passthrough ---

# /scramjet/* is served directly from the scramjet folder
[[redirects]]
  from = "/scramjet/*"
  to   = "/scramjet/:splat"
  status = 200

# /scram/* -> physical /scramjet/scram/*
[[redirects]]
  from = "/scram/*"
  to   = "/scramjet/scram/:splat"
  status = 200

# /baremux/* -> physical /scramjet/baremux/*
[[redirects]]
  from = "/baremux/*"
  to   = "/scramjet/baremux/:splat"
  status = 200

# /libcurl/* -> physical /scramjet/libcurl/*
[[redirects]]
  from = "/libcurl/*"
  to   = "/scramjet/libcurl/:splat"
  status = 200

# --- Everything else gets proxied to the tunnel via the function ---

[[redirects]]
  from = "/*"
  to   = "/.netlify/functions/proxy"
  status = 200
  force = true
