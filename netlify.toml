[build]
  publish = "."
  functions = "functions"

# ----------------------------------------------------
# PAGES: let Netlify serve your main HTML
# ----------------------------------------------------

# Home page (and SPA entry if you want)
[[redirects]]
  from = "/"
  to   = "/index.html"
  status = 200

# ----------------------------------------------------
# EVERYTHING ELSE -> function, which will redirect to
# the URL from page_link.txt
# ----------------------------------------------------

[[redirects]]
  from = "/*"
  to   = "/.netlify/functions/proxy"
  status = 200
  force = true
