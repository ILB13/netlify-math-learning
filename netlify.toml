[build]
  publish = "."
  functions = "functions"

# Scramjet static passthrough
[[redirects]]
  from = "/scramjet/*"
  to = "/scramjet/:splat"
  status = 200

[[redirects]]
  from = "/scram/*"
  to = "/scram/:splat"
  status = 200

[[redirects]]
  from = "/baremux/*"
  to = "/baremux/:splat"
  status = 200

# Proxy your presence API through the Netlify function
[[redirects]]
  from = "/presence/*"
  to = "/.netlify/functions/proxy?path=presence/:splat"
  status = 200
  force = true

# SPA fallback (so deep links load index.html)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
