[build]
  publish = "."
  functions = "functions"

# Scramjet static passthrough
[[redirects]]
  from = "/scramjet/*"
  to = "/scramjet/:splat"
  status = 200

[[redirects]]
  from = "/scram/*"
  to = "/scram/:splat"
  status = 200

[[redirects]]
  from = "/libcurl/*"
  to = "/libcurl/:splat"
  status = 200

[[redirects]]
  from = "/baremux/*"
  to = "/baremux/:splat"
  status = 200

# ✅ Proxy your API ping (POST will work)
[[redirects]]
  from = "/presence/*"
  to = "/.netlify/functions/proxy?path=presence/:splat"
  status = 200
  force = true

# ✅ SPA fallback (so deep links load index.html)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
